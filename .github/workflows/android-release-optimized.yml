name: Android Release (Optimized)

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # 明确超时限制

    steps:
    - uses: actions/checkout@v4

    # 优化缓存策略
    - name: Cache Gradle and dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 使用指定 JDK 版本
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 预安装 Android SDK 组件
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: '9.0'

    - name: Accept Android SDK licenses
      run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

    # 解码并设置 keystore
    - name: Setup Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/keystore/wishpool-release.jks
        echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
        echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
        echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

    # 预热 Gradle（提前下载依赖）
    - name: Gradle dependency download
      working-directory: android
      run: ./gradlew dependencies --no-daemon

    # 构建 Release APK
    - name: Build Release APK
      working-directory: android
      run: |
        ./gradlew assembleRelease \
          --no-daemon \
          --parallel \
          --configure-on-demand \
          -Dorg.gradle.jvmargs="-Xmx3g -XX:MaxMetaspaceSize=1g" \
          -Dkotlin.daemon.jvm.options="-Xmx2g"

    # 验证 APK
    - name: Verify APK
      working-directory: android
      run: |
        APK_PATH="app/build/outputs/apk/release/app-release.apk"
        if [ ! -f "$APK_PATH" ]; then
          echo "APK not found!"
          exit 1
        fi
        ls -la "$APK_PATH"
        echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

    # 上传到 Release
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/release/app-release.apk
        name: "app-release.apk"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}