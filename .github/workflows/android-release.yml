name: Android Release Build

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      KEYSTORE_FILE: release.keystore
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 platform-tools"

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Get version name from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed debug APK
        working-directory: android
        run: |
          ./gradlew :app:assembleDebug \
            --stacktrace \
            --build-cache \
            --parallel \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/wishpool-${{ steps.version.outputs.version }}-android.apk

      - name: Verify APK output
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/wishpool-${{ steps.version.outputs.version }}-android.apk"
          test -f "$APK_PATH"
          ls -lh "$APK_PATH"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishpool-${{ steps.version.outputs.version }}-android
          path: android/app/build/outputs/apk/debug/wishpool-${{ steps.version.outputs.version }}-android.apk
          if-no-files-found: error

      - name: Upload Gradle reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-reports-${{ github.run_id }}
          path: |
            android/app/build/reports
            android/build/reports
          if-no-files-found: ignore

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/debug/wishpool-${{ steps.version.outputs.version }}-android.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish summary
        run: |
          {
            echo "## Android release"
            echo "- Tag: ${{ github.ref_name }}"
            echo "- APK: wishpool-${{ steps.version.outputs.version }}-android.apk"
          } >> "$GITHUB_STEP_SUMMARY"
